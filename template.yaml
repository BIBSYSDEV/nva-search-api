#        Enabled: false

#  ElasticSearchDomainEndpointParameter:
#    Type: AWS::SSM::Parameter
#    Properties:
#      Description: URL to NVA elasticsearch
#      Value: !GetAtt NVAElasticSearch.DomainEndpoint
#      Name: ElasticsearchDomainEndpoint
#      Type: String

  NvaSearchApi:
    Type: AWS::Serverless::Api
    Properties:
#      Description: "root /  - Search for public available publications by given criteria **CommonMark**"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{ "apiId": "$context.apiId", "requestId": "$context.requestId", "requestTime": "$context.requestTime", "requestTimeEpoch": "$context.requestTimeEpoch", "httpMethod": "$context.httpMethod", "path": "$context.path", "status": "$context.status",  "error.message": "$context.error.message" }'
      StageName: Prod
      EndpointConfiguration: REGIONAL
      DefinitionBody:
        openapi: 3.0.3
        info:
          title: NVA Very Public Search API
          version: '0.0.5-SNAPSHOT'
          description: |-
            A short description of the API. _CommonMark_ syntax **MAY** be used for rich text representation.
            # Path Parameters
            * query
            * orderBy
            * sortOrder
            * from
            * results
          termsOfService: "termsOfService"
          license:
            name: Apache 2.0
            url: https://www.apache.org/licenses/LICENSE-2.0.html
        paths:
          /resources:
            info:
              description: "Description in root of the /resources path"
            get:
              Description: Search for public available publications optionally by given criteria
              consumes:
                - application/json
              produces:
                - application/json
              parameters:
                - name: query
                  in: query
                  description: Term to search for in resource.
                  required: false
                  schema:
                    type: string
                - name: orderBy
                  in: query
                  description: Field to order result by.
                  required: false
                  schema:
                    type: string
                - name: sortOrder
                  in: query
                  description: Order of search results (asc or desc).
                  required: false
                  schema:
                    type: string
                - name: from
                  in: query
                  description: Start posision from results, 0-based.
                  required: false
                  schema:
                    type: string
                - name: results
                  in: query
                  description: "Maximum number of publications in response."
                  required: false
                  schema:
                    type: string
              x-amazon-apigateway-integration:
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${NvaSearchResourcesApiFunction.Arn}/invocations
                responses: {}
                httpMethod: POST
                type: AWS_PROXY
              responses:
                "200":
                  description: "OK"
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Publication"
                "400":
                  description: Bad Request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Problem"
                "404":
                  description: Not Found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Problem"
                "500":
                  info:
                    description: "500 info description"
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Problem"
        components:
          schemas:
            Publication:
              type: object
              description: Structure returned from successful seach
              properties:
                abstract:
                  type: string
                  description: short abstract of content
                alternativeTitles:
                  type: array
                  description: short abstract of content
                  items:
                    type: string
                contributors:
                  type: array
                  description: List of contributing people
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                description:
                  type: string
                doi:
                  type: string
                id:
                  type: string
                modifiedDate:
                  type: date
#                owner:
#                  type: string
#                publicationDate:
#                  type: object
#                  properties:
#                    day:
#                      type: string
#                    month:
#                      type: string
#                    type:
#                      type: string
#                    year:
#                      type: string
#                publicationType:
#                  type: string
#                publishedDate:
#                  type: date
#                publisher:
#                  type: object
#                  properties:
#                    id:
#                      type: text
#                    name:
#                      type: text
#                reference:
#                  type: object
#                  properties:
#                    doi:
#                      type: string
#                    publicationContext:
#                      type: object
#                      properties:
#                        level:
#                          type: string
#                        linkedContext:
#                          type: string
#                        onlineIssn:
#                          type: string
#                        openAccess:
#                          type: boolean
#                        peerReviewed:
#                          type: boolean
#                        printIssn:
#                          type: string
#                        publisher:
#                          type: string
#                        seriesTitle:
#                          type: string
#                        title:
#                          type: string
#                        type:
#                          type: string
#                        url:
#                          type: string
#                    publicationInstance:
#                      type: object
#                      properties:
#                        articleNumber:
#                          type: string
#                        issue:
#                          type: string
#                        pages:
#                          type: object
#                          properties:
#                            begin:
#                              type: string
#                            end:
#                              type: string
#                            illustrated:
#                              type: boolean
#                            pages:
#                              type: string
#                            type:
#                              type: string
#                        peerReviewed:
#                          type: boolean
#                        textbookContent:
#                          type: boolean
#                        type:
#                          type: string
#                        volume:
#                          type: string
#                    type:
#                      type: string
#                tags:
#                  type: array
#                  items:
#                    type: string
#                title:
#                  type: string
            Problem:
              type: object
              description: Problem object model
              properties:
                title:
                  type: string
                  description: Title
                status:
                  type: integer
                  description: Kind of problem
                detail:
                  type: string
                  description: details of problem
                requestId:
                  type: string
                  description: Identifier of the request causing the problem
  NvaSearchLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: nva-search-layer
      Description: NVA Search common libraries
      ContentUri: search-commons/build/distributions/search-commons.zip
      CompatibleRuntimes:
        - java11
      LicenseInfo: 'MIT'
      RetentionPolicy: Retain


  NvaSearchResourcesApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: search-resources-api
      Handler: no.unit.nva.search.SearchResourcesApiHandler::handleRequest
      Layers:
        - !Ref NvaSearchLayer
      Runtime: java11
      MemorySize: 1408
      AutoPublishAlias: live
      DeploymentPreference:
        Type: AllAtOnce
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Timeout: 10
      Role: !GetAtt ReadOnlyAccessElasticSearchRole.Arn
      Environment:
        Variables:
          ALLOWED_ORIGIN: '*'
          ELASTICSEARCH_ENDPOINT_ADDRESS: !Ref ElasticsearchDomainEndpoint
          ELASTICSEARCH_ENDPOINT_INDEX: resources
          ELASTICSEARCH_REGION: !Ref "AWS::Region"
      Events:
        GetEvent:
          Type: Api
          Properties:
            Path: /resources
            Method: get
            RestApiId: !Ref NvaSearchApi

  SearchResourcesApiFunctionScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxConcurrency
      MinCapacity: !Ref MinConcurrency
      ResourceId: !Sub function:${NvaSearchResourcesApiFunction}:live
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lambda.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_LambdaConcurrency
      ScalableDimension: lambda:function:ProvisionedConcurrency
      ServiceNamespace: lambda
    DependsOn: NvaSearchResourcesApiFunctionAliaslive

  SearchResourcesApiFunctionScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: utilization
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref SearchResourcesApiFunctionScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 0.70
        PredefinedMetricSpecification:
          PredefinedMetricType: LambdaProvisionedConcurrencyUtilization



  NvaPublicationBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      BasePath: !Ref CustomDomainBasePath
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref NvaSearchApi
      Stage: !Ref NvaSearchApi.Stage
    DependsOn: NvaSearchResourcesApiFunctionAliaslive

